version: "3.9"

services:
  # ── Base de Datos MySQL ───────────────────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: pos_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: pos_db
      MYSQL_USER: pos_user
      MYSQL_PASSWORD: pos_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./setup.sql:/docker-entrypoint-initdb.d/setup.sql
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "pos_user", "-ppos_password"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── Backend FastAPI ───────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pos_backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: pos_user
      DB_PASSWORD: pos_password
      DB_NAME: pos_db
      SECRET_KEY: "cambia-esta-clave-secreta-en-produccion-min-32-chars"
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 480
      DEBUG: "false"
      # Desfase horario local respecto a UTC (datetime.utcnow() se usa para
      # guardar created_at). Ajustar según la zona horaria de la tienda.
      TIMEZONE_OFFSET_HOURS: -5
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5

volumes:
  mysql_data:
    driver: local

networks:
  default:
    name: pos_network
